# SecuriPDF - Stirling settings.yml uzerine bind edilir (sync-tools-config.py gunceller)

system:
  customHTMLFiles: true
  enableAnalytics: false
  showUpdate: false
  showUpdateOnlyAdmin: false
  googlevisibility: false
  defaultLocale: tr-TR
  enableUrlToPDF: false

legal:
  termsAndConditions: ""
  privacyPolicy: ""
  accessibilityStatement: ""
  cookiePolicy: ""
  impressum: ""

premium:
  enabled: false

metrics:
  enabled: false

ui:
  appName: SecuriPDF
  homeDescription: Kurumsal PDF işlem platformu
  appNameNavbar: SecuriPDF
  logoStyle: classic
  defaultHideUnavailableTools: true
  languages:
    - tr_TR
    - en_GB

