        sectionTitle: Sayfa aralığı

  - id: pdf-to-xlsx
    title: PDF → Excel
    description: PDF tablolarını Excel (XLSX) dosyasına dönüştürür.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/xlsx
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
