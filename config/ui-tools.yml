# SecuriPDF kullanici arayuzu
# Stirling endpoint ID'leri tools.yml ile uyumlu olmali.
# Kategoriler: recommended | convert | pages | security | signing | extract | remove | advanced
# Generic input tipleri: file | text | number | select | checkbox (+ ozel: compress, split, ...)

product: SecuriPDF
phase: 6

tools:
  - id: merge-pdfs
    title: PDF Birleştir
    description: Birden fazla PDF dosyasını tek belgede birleştirin.
    category: recommended
    icon: merge
    apiPath: /api/v1/general/merge-pdfs
    inputs:
      - name: fileInput
        label: PDF dosyaları seç
        type: file
        multiple: true
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: split-pages
    title: PDF Böl
    description: PDF'i sayfa numaraları, bölümler, boyut veya baskı parçalarına göre ayırın.
    category: recommended
    icon: split
    dynamicApiPath: true
    apiPath: /api/v1/general/split-pages
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: splitSettings
        type: split

  - id: compare
    title: Karşılaştır
    description: İki PDF belgesindeki metin farklarını yan yana HTML raporu olarak gösterir.
    category: recommended
    icon: compare
    apiPath: /api/v1/misc/compare
    inputs:
      - name: fileInput1
        label: Belge 1 (PDF)
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Belgeler
        showSelection: true
      - name: fileInput2
        label: Belge 2 (PDF)
        type: file
        accept: .pdf,application/pdf
        required: true
        showSelection: true
      - name: compareSettings
        type: compare

  - id: compress-pdf
    title: Sıkıştır
    description: PDF boyutunu küçültün, paylaşımı kolaylaştırın.
    category: recommended
    icon: compress
    apiPath: /api/v1/misc/compress-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: compressSettings
        type: compress
        defaultLevel: 5

  - id: pdf-to-word
    title: PDF → Word
    description: PDF belgesini Word (DOCX) veya ODT formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/word
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: outputFormat
        label: Çıktı formatı
        type: select
        default: docx
        options:
          - value: docx
            label: DOCX (Microsoft Word)
          - value: odt
            label: ODT (LibreOffice)

  - id: file-to-pdf
    title: Word / Office → PDF
    description: Word, Excel, PowerPoint ve diğer Office belgelerini PDF'e dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/file/pdf
    inputs:
      - name: fileInput
        label: Office belgesi seç
        type: file
        accept: .doc,.docx,.odt,.xls,.xlsx,.ods,.ppt,.pptx,.odp,.rtf,.txt
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: convert
    title: Dönüştür
    description: PDF, Office, görsel, e-posta ve e-kitap formatları arasında gelişmiş dönüşüm.
    category: convert
    icon: convert
    dynamicApiPath: true
    apiPath: /api/v1/convert/file/pdf
    inputs:
      - name: fileInput
        label: Dosya seç
        type: file
        multiple: true
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: convertSettings
        type: convert

  - id: ocr-pdf
    title: OCR / Tarama
    description: Taranmış PDF'te metni aranabilir ve seçilebilir hale getirin.
    category: recommended
    icon: ocr
    apiPath: /api/v1/misc/ocr-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: ocrSettings
        type: ocr

  - id: add-watermark
    title: Filigran
    description: PDF belgenize metin veya görsel filigran ekleyin.
    category: security
    icon: watermark
    apiPath: /api/v1/security/add-watermark
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: watermarkSettings
        type: watermark

  - id: add-stamp
    title: Damga
    description: PDF sayfalarına metin veya görsel damga ekleyin.
    category: security
    icon: stamp
    apiPath: /api/v1/misc/add-stamp
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: stampSettings
        type: stamp

  - id: add-password
    title: Parola Ekle
    description: PDF'e açma parolası ve izin kısıtlamaları ekleyin.
    category: security
    icon: lock
    apiPath: /api/v1/security/add-password
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: passwordSettings
        type: password

  - id: auto-redact
    title: Otomatik Karartma
    description: Belgeyi önizleyin, TCKN/telefon/e-posta gibi desenleri seçin ve platformda sansürleyin.
    category: security
    icon: redact
    apiPath: /api/v1/security/auto-redact
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: redactSettings
        type: redact-patterns

  - id: rotate-pdf
    title: Döndür
    description: PDF sayfalarını 90° adımlarla döndürün.
    category: pages
    icon: rotate
    apiPath: /api/v1/general/rotate-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
      - name: angle
        label: Döndürme yönü
        type: rotation
        default: "90"
        options:
          - value: "90"
            label: "90°"
          - value: "180"
            label: "180°"
          - value: "270"
            label: "270°"

  - id: remove-pages
    title: Sayfa Sil
    description: Belirttiğiniz sayfaları PDF'ten kaldırır; kalan sayfalar tek belgede kalır.
    category: pages
    icon: pages
    apiPath: /api/v1/general/remove-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumbers
        label: Silinecek sayfalar
        type: pageSelection
        selectionMode: remove
        required: true
        minKeep: 1
        sectionTitle: Sayfa seçimi
        hint: "Kırmızı işaretli sayfalar silinir; gri olanlar belgede kalır."

  - id: extract-pages
    title: Sayfa Çıkar
    description: Yalnızca seçtiğiniz sayfaları yeni bir PDF olarak çıkarır.
    category: extract
    icon: extract
    apiPath: /api/v1/general/rearrange-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumbers
        label: Çıkarılacak sayfalar
        type: pageSelection
        selectionMode: extract
        required: true
        sectionTitle: Sayfa seçimi
        hint: "Mavi işaretli sayfalar yeni PDF'e alınır."

  - id: rearrange-pages
    title: Sayfaları Yeniden Sırala
    description: Sayfa sırasını değiştirin veya hazır düzenleme modlarından birini uygulayın.
    category: pages
    icon: pages
    apiPath: /api/v1/general/rearrange-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: rearrangeSettings
        type: rearrange
        sectionTitle: Sıralama

  - id: scale-pages
    title: Sayfa Ölçekle
    description: Sayfa boyutunu veya içerik ölçeğini ayarlayın (A4, Letter vb.).
    category: pages
    icon: pages
    apiPath: /api/v1/general/scale-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageSize
        label: Hedef sayfa boyutu
        type: select
        default: A4
        options:
          - value: KEEP
            label: Mevcut boyutu koru
          - value: A4
            label: A4
          - value: LETTER
            label: Letter
          - value: LEGAL
            label: Legal
          - value: A3
            label: A3
          - value: A5
            label: A5
      - name: scaleFactor
        label: İçerik ölçeği
        type: number
        default: 1
        min: 0.1
        max: 5
        step: 0.05
        hint: "1 = orijinal boyut; 0.9 küçültür, 1.1 büyütür."

  - id: add-page-numbers
    title: Sayfa Numarası Ekle
    description: Sayfalara numara ekleyin; konum, başlangıç numarası ve yazı boyutunu ayarlayın.
    category: pages
    icon: pages
    apiPath: /api/v1/misc/add-page-numbers
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumberSettings
        type: addPageNumbers
        sectionTitle: Numaralandırma

  - id: flatten
    title: Düzleştir
    description: Form alanları ve etkileşimli öğeleri statik sayfa içeriğine dönüştürür.
    category: advanced
    icon: tool
    apiPath: /api/v1/misc/flatten
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: flattenOnlyForms
        label: Yalnızca formları düzleştir
        type: checkbox
        default: false
        checkboxLabel: Yalnızca form alanlarını düzleştir (tüm sayfayı görsele çevirme)

  - id: repair
    title: Onar
    description: Bozuk veya açılmayan PDF dosyalarını onarmayı dener.
    category: advanced
    icon: tool
    apiPath: /api/v1/misc/repair
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: remove-blanks
    title: Boş Sayfaları Kaldır
    description: Tarama veya birleştirme sonrası kalan boş sayfaları temizler.
    category: remove
    icon: tool
    apiPath: /api/v1/misc/remove-blanks
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: threshold
        label: Beyazlık eşiği (0–255)
        type: number
        default: 10
        min: 0
        max: 255
        hint: "Pikselin beyaz sayılması için gereken minimum değer."
      - name: whitePercent
        label: Beyaz yüzde (%)
        type: number
        default: 99.9
        min: 50
        max: 100
        step: 0.1
        hint: "Sayfanın bu kadar yüzdesi beyazsa boş kabul edilir."

  - id: sanitize-pdf
    title: PDF Temizle
    description: JavaScript, gömülü dosya, meta veri ve bağlantı gibi riskli öğeleri kaldırır.
    category: security
    icon: lock
    apiPath: /api/v1/security/sanitize-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: removeJavaScript
        label: JavaScript kaldır
        type: checkbox
        default: true
        checkboxLabel: JavaScript işlemlerini kaldır
      - name: removeEmbeddedFiles
        label: Gömülü dosyalar
        type: checkbox
        default: true
        checkboxLabel: Gömülü dosyaları kaldır
      - name: removeXMPMetadata
        label: XMP meta verisi
        type: checkbox
        default: false
        checkboxLabel: XMP meta verisini kaldır
      - name: removeMetadata
        label: Belge bilgisi
        type: checkbox
        default: false
        checkboxLabel: Belge bilgisi meta verisini kaldır
      - name: removeLinks
        label: Bağlantılar
        type: checkbox
        default: false
        checkboxLabel: Bağlantıları kaldır
      - name: removeFonts
        label: Fontlar
        type: checkbox
        default: false
        checkboxLabel: Fontları kaldır

  - id: remove-password
    title: Parola Kaldır
    description: Bilinen parola ile korumalı PDF'in şifresini kaldırır.
    category: security
    icon: lock
    apiPath: /api/v1/security/remove-password
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: password
        label: Mevcut parola
        type: text
        required: true

  - id: pdf-to-img
    title: PDF → Görsel
    description: PDF sayfalarını PNG, JPEG veya diğer görsel formatlara dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/img
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: imageFormat
        label: Görsel formatı
        type: select
        default: png
        options:
          - value: png
            label: PNG
          - value: jpeg
            label: JPEG
          - value: webp
            label: WebP
          - value: tiff
            label: TIFF
      - name: dpi
        label: Çözünürlük (DPI)
        type: number
        default: 300
        min: 72
        max: 600
      - name: colorType
        label: Renk modu
        type: select
        default: color
        options:
          - value: color
            label: Renkli
          - value: grayscale
            label: Gri ton
          - value: blackwhite
            label: Siyah-beyaz
      - name: singleOrMultiple
        label: Çıktı yapısı
        type: select
        default: multiple
        options:
          - value: multiple
            label: Her sayfa ayrı dosya (ZIP)
          - value: single
            label: Tek dosya

  - id: img-to-pdf
    title: Görsel → PDF
    description: JPG, PNG ve diğer görselleri PDF belgesine dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/img/pdf
    inputs:
      - name: fileInput
        label: Görsel dosyaları
        type: file
        multiple: true
        accept: .jpg,.jpeg,.png,.gif,.bmp,.tiff,.webp,image/*
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: fitOption
        label: Sayfaya sığdırma
        type: select
        default: maintainAspectRatio
        options:
          - value: maintainAspectRatio
            label: En-boy oranını koru
          - value: fitDocumentToPage
            label: Belgeyi sayfaya sığdır
          - value: fillPage
            label: Sayfayı doldur
      - name: autoRotate
        label: Otomatik döndür
        type: checkbox
        default: true
        checkboxLabel: EXIF yönelimine göre döndür

  - id: pdf-to-presentation
    title: PDF → Sunum
    description: PDF'i PowerPoint (PPTX) veya ODP sunum formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/presentation
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: outputFormat
        label: Çıktı formatı
        type: select
        default: pptx
        options:
          - value: pptx
            label: PPTX
          - value: odp
            label: ODP

  - id: pdf-to-text
    title: PDF → Metin
    description: PDF içeriğini düz metin veya RTF olarak çıkarın.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/text
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: outputFormat
        label: Çıktı formatı
        type: select
        default: txt
        options:
          - value: txt
            label: TXT (düz metin)
          - value: rtf
            label: RTF

  - id: pdf-to-html
    title: PDF → HTML
    description: PDF belgesini HTML web sayfasına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/html
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: pdf-to-pdfa
    title: PDF → PDF/A
    description: Arşivleme için PDF/A uyumlu formata dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/pdfa
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: outputFormat
        label: PDF/A seviyesi
        type: select
        default: pdfa-2b
        options:
          - value: pdfa-1b
            label: PDF/A-1b
          - value: pdfa-2b
            label: PDF/A-2b
          - value: pdfa-3b
            label: PDF/A-3b

  - id: html-to-pdf
    title: HTML → PDF
    description: HTML dosyasını veya ZIP (HTML+CSS paketi) PDF'e dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/html/pdf
    inputs:
      - name: fileInput
        label: HTML veya ZIP dosyası
        type: file
        accept: .html,.htm,.zip,text/html
        required: true
        sectionTitle: Dosyalar
      - name: zoom
        label: Yakınlaştırma
        type: number
        default: 1
        min: 0.1
        max: 3
        step: 0.1

  - id: markdown-to-pdf
    title: Markdown → PDF
    description: Markdown (.md) belgesini PDF formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/markdown/pdf
    inputs:
      - name: fileInput
        label: Markdown dosyası
        type: file
        accept: .md,.markdown,text/markdown
        required: true
        sectionTitle: Dosyalar

  - id: crop
    title: Kırp
    description: PDF sayfalarını görsel olarak veya kenar boşluğu ile kırpın.
    category: pages
    icon: pages
    apiPath: /api/v1/general/crop
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: cropSettings
        type: crop
        sectionTitle: Kırpma alanı

  - id: multi-page-layout
    title: Çoklu Sayfa Düzeni
    description: Birden fazla sayfayı tek sayfada birleştirir (2-up, 4-up vb.).
    category: pages
    icon: pages
    apiPath: /api/v1/general/multi-page-layout
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pagesPerSheet
        label: Sayfa / yaprak
        type: select
        default: "4"
        options:
          - value: "2"
            label: 2-up (1×2)
          - value: "4"
            label: 4-up (2×2)
          - value: "9"
            label: 9-up (3×3)
          - value: "16"
            label: 16-up (4×4)
      - name: addBorder
        label: Kenarlık
        type: checkbox
        default: false
        checkboxLabel: Sayfalar arası kenarlık ekle

  - id: overlay-pdf
    title: PDF Katmanlama
    description: Bir PDF'i diğerinin üzerine veya altına yerleştirir.
    category: pages
    icon: pages
    apiPath: /api/v1/general/overlay-pdfs
    inputs:
      - name: fileInput
        label: Ana PDF
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Belgeler
        showSelection: true
      - name: overlayFiles
        label: Katman PDF(ler)
        type: file
        accept: .pdf,application/pdf
        multiple: true
        required: true
        showSelection: true
      - name: overlayMode
        label: Katman modu
        type: select
        default: SequentialOverlay
        options:
          - value: SequentialOverlay
            label: Sıralı
          - value: InterleavedOverlay
            label: Dönüşümlü
          - value: FixedRepeatOverlay
            label: Sabit tekrar
      - name: overlayPosition
        label: Konum
        type: select
        default: "0"
        options:
          - value: "0"
            label: Ön plan (üstte)
          - value: "1"
            label: Arka plan (altta)

  - id: pdf-to-single-page
    title: Tek Uzun Sayfa
    description: Tüm sayfaları dikey olarak birleştirip tek uzun PDF sayfası oluşturur.
    category: pages
    icon: pages
    apiPath: /api/v1/general/pdf-to-single-page
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: extract-images
    title: Görselleri Çıkar
    description: PDF içindeki gömülü görselleri ZIP arşivi olarak indirir.
    category: extract
    icon: extract
    apiPath: /api/v1/misc/extract-images
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: format
        label: Görsel formatı
        type: select
        default: png
        options:
          - value: png
            label: PNG
          - value: jpeg
            label: JPEG
          - value: gif
            label: GIF
      - name: allowDuplicates
        label: Yinelenen görseller
        type: checkbox
        default: false
        checkboxLabel: Yinelenen görselleri de kaydet

  - id: get-info-on-pdf
    title: PDF Bilgisi
    description: Belge meta verisi, sayfa sayısı ve güvenlik özelliklerini JSON raporu olarak gösterir.
    category: review
    icon: tool
    apiPath: /api/v1/security/get-info-on-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
