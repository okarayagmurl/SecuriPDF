      - type: toolPanel
        sectionTitle: Bilgi

  - id: pdf-to-csv
    title: PDF → CSV
    description: PDF tablolarını CSV dosyasına dönüştürür.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/csv
