        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Meta veri

  - id: remove-image-pdf
    title: Görselleri Kaldır
    description: PDF içindeki gömülü görselleri kaldırarak dosya boyutunu küçültür.
    category: remove
    icon: tool
    apiPath: /api/v1/general/remove-image-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: pdf-to-xml
    title: PDF → XML
    description: PDF yapısını XML formatında dışa aktarır.
