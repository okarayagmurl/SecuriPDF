  - id: eml-to-pdf
    title: E-posta → PDF
    description: EML e-posta dosyasını PDF belgesine dönüştürür.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/eml/pdf
    inputs:
      - name: fileInput
        label: EML dosyası
        type: file
        accept: .eml,.msg,message/rfc822
        required: true
