        sectionTitle: Sayfa aralığı

  - id: pdf-to-markdown
    title: PDF → Markdown
    description: PDF içeriğini Markdown (.md) formatına dönüştürür.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/markdown
    inputs:
      - name: fileInput
        label: PDF dosyası
