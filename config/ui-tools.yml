# SecuriPDF kullanici arayuzu
# Stirling endpoint ID'leri tools.yml ile uyumlu olmali.
# Kategoriler: recommended | convert | pages | security | signing | extract | remove | advanced
# Generic input tipleri: file | text | number | select | checkbox (+ ozel: compress, split, ...)

product: SecuriPDF
phase: 6

tools:
  - id: merge-pdfs
    title: PDF Birleştir
    description: Birden fazla PDF dosyasını tek belgede birleştirin.
    category: recommended
    icon: merge
    apiPath: /api/v1/general/merge-pdfs
    inputs:
      - name: fileInput
        label: PDF dosyaları seç
        type: file
        multiple: true
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true

  - id: split-pages
    title: PDF Böl
    description: PDF'i sayfa numaraları, bölümler, boyut veya baskı parçalarına göre ayırın.
    category: recommended
    icon: split
    dynamicApiPath: true
    apiPath: /api/v1/general/split-pages
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: splitSettings
        type: split

  - id: compare
    title: Karşılaştır
    description: İki PDF belgesindeki metin farklarını yan yana HTML raporu olarak gösterir.
    category: recommended
    icon: compare
    apiPath: /api/v1/misc/compare
    inputs:
      - name: fileInput1
        label: Belge 1 (PDF)
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Belgeler
        showSelection: true
      - name: fileInput2
        label: Belge 2 (PDF)
        type: file
        accept: .pdf,application/pdf
        required: true
        showSelection: true
      - name: compareSettings
        type: compare

  - id: compress-pdf
    title: Sıkıştır
    description: PDF boyutunu küçültün, paylaşımı kolaylaştırın.
    category: recommended
    icon: compress
    apiPath: /api/v1/misc/compress-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: compressSettings
        type: compress
        defaultLevel: 5

  - id: pdf-to-word
    title: PDF → Word
    description: PDF belgesini Word (DOCX) veya ODT formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/word
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Çıktı formatı

  - id: file-to-pdf
    title: Word / Office → PDF
    description: Word, Excel, PowerPoint ve diğer Office belgelerini PDF'e dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/file/pdf
    inputs:
      - name: fileInput
        label: Office belgesi seç
        type: file
        accept: .doc,.docx,.odt,.xls,.xlsx,.ods,.ppt,.pptx,.odp,.rtf,.txt
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: convert
    title: Dönüştür
    description: PDF, Office, görsel, e-posta ve e-kitap formatları arasında gelişmiş dönüşüm.
    category: convert
    icon: convert
    dynamicApiPath: true
    apiPath: /api/v1/convert/file/pdf
    inputs:
      - name: fileInput
        label: Dosya seç
        type: file
        multiple: true
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: convertSettings
        type: convert

  - id: ocr-pdf
    title: OCR / Tarama
    description: Taranmış PDF'te metni aranabilir ve seçilebilir hale getirin.
    category: recommended
    icon: ocr
    apiPath: /api/v1/misc/ocr-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: ocrSettings
        type: ocr

  - id: add-watermark
    title: Filigran
    description: PDF belgenize metin veya görsel filigran ekleyin.
    category: security
    icon: watermark
    apiPath: /api/v1/security/add-watermark
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: watermarkSettings
        type: watermark

  - id: add-stamp
    title: Damga
    description: PDF sayfalarına metin veya görsel damga ekleyin.
    category: security
    icon: stamp
    apiPath: /api/v1/misc/add-stamp
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: stampSettings
        type: stamp

  - id: add-password
    title: Parola Ekle
    description: PDF'e açma parolası ve izin kısıtlamaları ekleyin.
    category: security
    icon: lock
    apiPath: /api/v1/security/add-password
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: passwordSettings
        type: password

  - id: auto-redact
    title: Otomatik Karartma
    description: Belgeyi önizleyin, TCKN/telefon/e-posta gibi desenleri seçin ve platformda sansürleyin.
    category: security
    icon: redact
    apiPath: /api/v1/security/auto-redact
    inputs:
      - name: fileInput
        label: PDF dosyası seç
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: redactSettings
        type: redact-patterns

  - id: rotate-pdf
    title: Döndür
    description: PDF sayfalarını 90° adımlarla döndürün.
    category: pages
    icon: rotate
    apiPath: /api/v1/general/rotate-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
      - name: angle
        label: Döndürme yönü
        type: rotation
        default: "90"
        options:
          - value: "90"
            label: "90°"
          - value: "180"
            label: "180°"
          - value: "270"
            label: "270°"

  - id: remove-pages
    title: Sayfa Sil
    description: Belirttiğiniz sayfaları PDF'ten kaldırır; kalan sayfalar tek belgede kalır.
    category: pages
    icon: pages
    apiPath: /api/v1/general/remove-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumbers
        label: Silinecek sayfalar
        type: pageSelection
        selectionMode: remove
        required: true
        minKeep: 1
        sectionTitle: Sayfa seçimi
        hint: "Kırmızı işaretli sayfalar silinir; gri olanlar belgede kalır."

  - id: extract-pages
    title: Sayfa Çıkar
    description: Yalnızca seçtiğiniz sayfaları yeni bir PDF olarak çıkarır.
    category: extract
    icon: extract
    apiPath: /api/v1/general/rearrange-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumbers
        label: Çıkarılacak sayfalar
        type: pageSelection
        selectionMode: extract
        required: true
        sectionTitle: Sayfa seçimi
        hint: "Mavi işaretli sayfalar yeni PDF'e alınır."

  - id: rearrange-pages
    title: Sayfaları Yeniden Sırala
    description: Sayfa sırasını değiştirin veya hazır düzenleme modlarından birini uygulayın.
    category: pages
    icon: pages
    apiPath: /api/v1/general/rearrange-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: rearrangeSettings
        type: rearrange
        sectionTitle: Sıralama

  - id: scale-pages
    title: Sayfa Ölçekle
    description: Sayfa boyutunu veya içerik ölçeğini ayarlayın (A4, Letter vb.).
    category: pages
    icon: pages
    apiPath: /api/v1/general/scale-pages
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Ölçekleme

  - id: add-page-numbers
    title: Sayfa Numarası Ekle
    description: Sayfalara numara ekleyin; konum, başlangıç numarası ve yazı boyutunu ayarlayın.
    category: pages
    icon: pages
    apiPath: /api/v1/misc/add-page-numbers
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: pageNumberSettings
        type: addPageNumbers
        sectionTitle: Numaralandırma

  - id: flatten
    title: Düzleştir
    description: Form alanları ve etkileşimli öğeleri statik sayfa içeriğine dönüştürür.
    category: advanced
    icon: tool
    apiPath: /api/v1/misc/flatten
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Düzleştirme

  - id: repair
    title: Onar
    description: Bozuk veya açılmayan PDF dosyalarını onarmayı dener.
    category: advanced
    icon: tool
    apiPath: /api/v1/misc/repair
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
