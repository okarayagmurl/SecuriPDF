      - type: toolPanel
        sectionTitle: Bilgi

  - id: remove-blanks
    title: Boş Sayfaları Kaldır
    description: Tarama veya birleştirme sonrası kalan boş sayfaları temizler.
    category: remove
    icon: tool
    apiPath: /api/v1/misc/remove-blanks
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Hassasiyet

  - id: sanitize-pdf
    title: PDF Temizle
    description: JavaScript, gömülü dosya, meta veri ve bağlantı gibi riskli öğeleri kaldırır.
    category: security
    icon: lock
    apiPath: /api/v1/security/sanitize-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Temizleme seçenekleri

  - id: remove-password
    title: Parola Kaldır
    description: Bilinen parola ile korumalı PDF'in şifresini kaldırır.
    category: security
    icon: lock
    apiPath: /api/v1/security/remove-password
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Parola

  - id: pdf-to-img
    title: PDF → Görsel
    description: PDF sayfalarını PNG, JPEG veya diğer görsel formatlara dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/img
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Görsel ayarları

  - id: img-to-pdf
    title: Görsel → PDF
    description: JPG, PNG ve diğer görselleri PDF belgesine dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/img/pdf
    inputs:
      - name: fileInput
        label: Görsel dosyaları
        type: file
        multiple: true
        accept: .jpg,.jpeg,.png,.gif,.bmp,.tiff,.webp,image/*
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Sayfaya sığdırma

  - id: pdf-to-presentation
    title: PDF → Sunum
    description: PDF'i PowerPoint (PPTX) veya ODP sunum formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/presentation
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Çıktı formatı

  - id: pdf-to-text
    title: PDF → Metin
    description: PDF içeriğini düz metin veya RTF olarak çıkarın.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/text
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Çıktı formatı

  - id: pdf-to-html
    title: PDF → HTML
    description: PDF belgesini HTML web sayfasına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/html
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: pdf-to-pdfa
    title: PDF → PDF/A
    description: Arşivleme için PDF/A uyumlu formata dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/pdf/pdfa
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: PDF/A seviyesi

  - id: html-to-pdf
    title: HTML → PDF
    description: HTML dosyasını veya ZIP (HTML+CSS paketi) PDF'e dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/html/pdf
    inputs:
      - name: fileInput
        label: HTML veya ZIP dosyası
        type: file
        accept: .html,.htm,.zip,text/html
        required: true
        sectionTitle: Dosyalar
      - type: toolPanel
        sectionTitle: Yakınlaştırma

  - id: markdown-to-pdf
    title: Markdown → PDF
    description: Markdown (.md) belgesini PDF formatına dönüştürün.
    category: convert
    icon: convert
    apiPath: /api/v1/convert/markdown/pdf
    inputs:
      - name: fileInput
        label: Markdown dosyası
        type: file
        accept: .md,.markdown,text/markdown
        required: true
        sectionTitle: Dosyalar
      - type: toolPanel
        sectionTitle: Bilgi

  - id: crop
    title: Kırp
    description: PDF sayfalarını görsel olarak veya kenar boşluğu ile kırpın.
    category: pages
    icon: pages
    apiPath: /api/v1/general/crop
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: cropSettings
        type: crop
        sectionTitle: Kırpma alanı

  - id: multi-page-layout
    title: Çoklu Sayfa Düzeni
    description: Birden fazla sayfayı tek sayfada birleştirir (2-up, 4-up vb.).
    category: pages
    icon: pages
    apiPath: /api/v1/general/multi-page-layout
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Düzen

  - id: overlay-pdf
    title: PDF Katmanlama
    description: Bir PDF'i diğerinin üzerine veya altına yerleştirir.
    category: pages
    icon: pages
    apiPath: /api/v1/general/overlay-pdfs
    inputs:
      - name: fileInput
        label: Ana PDF
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Belgeler
        showSelection: true
      - name: overlayFiles
        label: Katman PDF(ler)
        type: file
        accept: .pdf,application/pdf
        multiple: true
        required: true
        showSelection: true
      - type: toolPanel
        sectionTitle: Katman ayarları

  - id: pdf-to-single-page
    title: Tek Uzun Sayfa
    description: Tüm sayfaları dikey olarak birleştirip tek uzun PDF sayfası oluşturur.
    category: pages
    icon: pages
    apiPath: /api/v1/general/pdf-to-single-page
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: extract-images
    title: Görselleri Çıkar
    description: PDF içindeki gömülü görselleri ZIP arşivi olarak indirir.
    category: extract
    icon: extract
    apiPath: /api/v1/misc/extract-images
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Çıkarma ayarları

  - id: get-info-on-pdf
    title: PDF Bilgisi
    description: Belge meta verisi, sayfa sayısı ve güvenlik özelliklerini JSON raporu olarak gösterir.
    category: review
    icon: tool
    apiPath: /api/v1/security/get-info-on-pdf
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: remove-cert-sign
    title: Sertifika İmzasını Kaldır
    description: PDF üzerindeki dijital sertifika imzasını kaldırır.
    category: signing
    icon: lock
    apiPath: /api/v1/security/remove-cert-sign
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: cert-sign
    title: Sertifika ile İmzala
    description: PDF belgesini PKCS#12 (.p12/.pfx) veya PEM sertifikası ile dijital olarak imzalar.
    category: signing
    icon: lock
    apiPath: /api/v1/security/cert-sign
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - name: certSignSettings
        type: cert-sign

  - id: validate-signature
    title: İmza Doğrula
    description: PDF üzerindeki dijital imzayı doğrular ve sonucu JSON raporu olarak döner.
    category: verification
    icon: lock
    apiPath: /api/v1/security/validate-signature
    inputs:
      - name: fileInput
        label: PDF dosyası
        type: file
        accept: .pdf,application/pdf
        required: true
        sectionTitle: Dosyalar
        showSelection: true
      - type: toolPanel
        sectionTitle: Bilgi

  - id: update-metadata
    title: Meta Veri Düzenle
    description: PDF belge bilgilerini (başlık, yazar, konu vb.) günceller veya siler.
    category: advanced
    icon: tool
    apiPath: /api/v1/misc/update-metadata
    inputs:
