# SecuriPDF - Stirling-PDF settings.yml
# Bu dosya sync-tools-config.sh tarafından endpoints bölümü için güncellenir.
# Diğer ayarları buradan düzenleyebilirsiniz.

security:
  enableLogin: false  # Ticari: ASLA true — bkz. docs/AUTH-ARCHITECTURE.md
  csrfDisabled: false

system:
  defaultLocale: tr-TR
  googlevisibility: false
  enableAnalytics: false
  showUpdate: false
  showUpdateOnlyAdmin: true
  customHTMLFiles: true
  maxFileSize: "500"

ui:
  appName: SecuriPDF
  homeDescription: Kurumsal PDF işlem platformu
  appNameNavbar: SecuriPDF
  logoStyle: classic
  defaultHideUnavailableTools: true
  languages:
    - tr_TR
    - en_GB

metrics:
  enabled: false

endpoints:
  toRemove:
    - add-attachments
    - add-image
    - add-page-numbers
    - add-stamp
    - adjust-contrast
    - auto-redact
    - auto-rename
