    - compare
    - crop
    - delete-fields
    - dev-airgapped-docs
    - dev-api-docs
    - dev-folder-scanning-docs
    - dev-sso-guide-docs
    - edit-table-of-contents
    - eml-to-pdf
    - extract-image-scans
    - extract-images
    - extract-pages
    - fields
    - fill
    - flatten
    - get-info-on-pdf
    - handleData
    - html-to-pdf
    - json-to-pdf
    - markdown-to-pdf
    - modify-fields
    - multi-page-layout
    - multi-tool
    - overlay-pdf
    - pdf-to-cbr
    - pdf-to-cbz
    - pdf-to-csv
    - pdf-to-epub
    - pdf-to-html
    - pdf-to-img
    - pdf-to-json
