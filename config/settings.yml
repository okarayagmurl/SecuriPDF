# SecuriPDF - Stirling-PDF settings.yml
# Bu dosya sync-tools-config.sh tarafından endpoints bölümü için güncellenir.
# Diğer ayarları buradan düzenleyebilirsiniz.

security:
  enableLogin: false  # Ticari: ASLA true — bkz. docs/AUTH-ARCHITECTURE.md
  csrfDisabled: false

system:
  defaultLocale: tr-TR
  googlevisibility: false
  enableAnalytics: false
  showUpdate: false
  showUpdateOnlyAdmin: true
  customHTMLFiles: true
  maxFileSize: "500"

ui:
  appNameNavbar: SecuriPDF
  logoStyle: classic
  defaultHideUnavailableTools: true
  languages:
    - tr_TR
    - en_GB

metrics:
  enabled: false

endpoints:
  toRemove:
    - adjust-contrast
    - automate
    - delete-fields
    - dev-airgapped-docs
    - dev-api-docs
    - dev-folder-scanning-docs
    - dev-sso-guide-docs
    - fields
    - fill
    - handleData
    - json-to-pdf
    - modify-fields
    - multi-tool
    - pdf-to-json
    - pdf-to-rtf
    - pdf-to-video
    - pipeline
    - redact
    - remove-annotations
    - show-javascript
  groupsToRemove: []
