# Entera PDF - Aktif Araç Listesi (Whitelist)
# Bu dosyayı düzenledikten sonra: ./scripts/sync-tools-config.sh
# Ardından container'ı yeniden başlatın.

product: SecuriPDF
version: "1.0"

# MVP'de aktif olacak araçlar (Stirling-PDF endpoint ID'leri)
# Tam liste: https://docs.stirlingpdf.com/Configuration/Endpoint%20or%20Feature%20Customisation
enabled:
  # Birleştirme ve bölme
  - merge-pdfs
  - split-pages
  - split-by-size-or-count
  - split-pdf-by-chapters
  - split-pdf-by-sections
  - auto-split-pdf
  - split-for-poster-print
  - compare

  # Sıkıştırma ve OCR
  - compress-pdf
  - ocr-pdf

  # Dönüşüm
  - pdf-to-word
  - file-to-pdf
  - convert
  - img-to-pdf
  - pdf-to-img
  - pdf-to-presentation
  - pdf-to-text
  - pdf-to-html
  - pdf-to-xml
  - pdf-to-csv
  - pdf-to-xlsx
  - pdf-to-markdown
  - pdf-to-pdfa
  - pdf-to-epub
  - pdf-to-cbz
  - pdf-to-cbr
  - html-to-pdf
  - markdown-to-pdf
  - eml-to-pdf
  - cbz-to-pdf
  - cbr-to-pdf

  # Düzenleme
  - rotate-pdf
  - remove-pages
  - extract-pages
  - rearrange-pages
  - scale-pages
  - add-page-numbers
  - add-watermark
  - add-stamp
  - text-editor-pdf   # PDF metin düzenleyici (Stirling 2.1+)
  - view-pdf           # PDF görüntüleyici

  # Güvenlik
  - add-password
  - remove-password
  - sanitize-pdf
  - auto-redact
  - sign                 # Çizim/metin imza
  - cert-sign            # Sertifika imzası

  # Bakım / optimizasyon
  - flatten
  - repair
  - remove-blanks
  - extract-images
  - get-info-on-pdf

  # Gelişmiş sayfa
  - crop
  - multi-page-layout
  - overlay-pdf
  - pdf-to-single-page
  - remove-cert-sign
  - update-metadata
  - validate-signature
  - remove-image-pdf
  - scanner-effect
  - add-image
  - auto-rename
  - booklet-imposition
  - change-permissions
  - replace-invert-pdf
  - url-to-pdf
  - unlock-pdf-forms
  - extract-attachments
  - add-attachments
  - extract-image-scans
  - vector-to-pdf
  - pdf-to-vector
  - ebook-to-pdf
  - verify-pdf
  - edit-table-of-contents

# UI davranışı
ui:
  hide_unavailable_tools: true

# Not: Word → PDF işlemi file-to-pdf endpoint'i üzerinden LibreOffice ile yapılır.
# OCR için fat image ve tessdata volume gereklidir.
