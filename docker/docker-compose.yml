volumes:
  entera_data:
    driver: local
  entera_config:
    driver: local
  entera_logs:
    driver: local
  entera_pipeline:
    driver: local
  entera_uploads:
    driver: local
  entera_backups:
    driver: local
  # entera_postgres:
  # entera_redis:

networks:
  entera-net:
    driver: bridge
