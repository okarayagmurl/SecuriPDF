# SecuriPDF — Nginx (Stirling + Platform API + Admin + TLS/IP)

resolver 127.0.0.11 valid=10s ipv6=off;

include /etc/nginx/conf.d/ip-whitelist.conf;
include /etc/nginx/conf.d/auth-headers.conf;

server {
    listen 8080;
    server_name _;

    if ($ip_allowed = 0) {
        return 403;
    }

    client_max_body_size ${CLIENT_MAX_BODY_SIZE};
    client_body_timeout 3600s;
    client_header_timeout 60s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Platform — Vault API (Faz 3)
    location /api/vault/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
    }

    # Platform — Orchestration (Faz 4)
    location /api/orchestration/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Platform — License (Faz 6)
    location /api/license/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Admin UI (Faz 5)
    location /admin {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Stirling-PDF
    location / {
        set $backend entera-pdf:8080;
        proxy_pass http://$backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Auth-Request-User $sp_auth_user;
        proxy_set_header X-Auth-Request-Email $sp_auth_email;
        proxy_set_header X-Auth-Request-Groups $sp_auth_groups;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
