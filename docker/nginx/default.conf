# SecuriPDF — Nginx (Stirling + Platform API + Admin)
# Ortak resolver / IP / auth map: 00-http-snippet.conf

server {
    listen 8080;
    server_name _;

    if ($ip_allowed = 0) {
        return 403;
    }

    client_max_body_size ${CLIENT_MAX_BODY_SIZE};
    client_body_timeout 3600s;
    client_header_timeout 60s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Platform — Vault API (Faz 3)
    location /api/vault/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
    }

    # Platform — Orchestration (Faz 4)
    location /api/orchestration/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Platform — License (Faz 6)
    location /api/license/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Admin UI (Faz 5)
    location /admin {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    # Platform — kullanici arayuzu API (faz 1)
    location /api/app/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
    }

    # Platform — Stirling PDF motor proxy (faz 1)
    location /api/pdf/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
        client_body_buffer_size 16m;
    }

    # SecuriPDF kullanici arayuzu (Stirling UI gizli — yalnizca API)
    location /app/static/ {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        include /etc/nginx/conf.d/platform-proxy.conf;
    }

    location / {
        set $platform securipdf-platform:8000;
        proxy_pass http://$platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/conf.d/platform-proxy.conf;
        proxy_read_timeout ${PROXY_READ_TIMEOUT}s;
        proxy_send_timeout ${PROXY_SEND_TIMEOUT}s;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
