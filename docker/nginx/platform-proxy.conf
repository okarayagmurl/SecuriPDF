# Platform upstream — oauth2-proxy auth header'lari
proxy_set_header X-Auth-Request-User $sp_auth_user;
proxy_set_header X-Auth-Request-Email $sp_auth_email;
proxy_set_header X-Auth-Request-Groups $sp_auth_groups;
proxy_set_header X-Forwarded-Access-Token $sp_access_token;
proxy_set_header X-Auth-Request-Access-Token $sp_access_token;
