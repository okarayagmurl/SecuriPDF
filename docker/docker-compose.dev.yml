# SecuriPDF — Yerel gelistirme overlay (offline/prod'da KULLANMAYIN)
#
# Platform kodunu image yerine host'tan mount eder; statik degisiklikler icin rebuild gerekmez.
# Offline pakette services/platform/app yoktur — bu dosya eklenirse platform unhealthy olur.
#
# Kullanim:
#   docker compose -f docker-compose.yml -f docker-compose.auth.yml -f docker-compose.dev.yml up -d --build
#   veya: .\up-auth.ps1 -Dev

name: entera-pdf

services:
  securipdf-platform:
    volumes:
      - ../services/platform/app:/app/app:ro
